        } else {

          var endParts = endDate.split("-");
          var eYear = parseInt(endParts[0]);
          var eMonth = parseInt(endParts[1]);
          var targetMonth = eMonth - months;
          var targetYear = eYear;
          while (targetMonth <= 0) { targetMonth += 12; targetYear--; }
          var lastDay = new Date(targetYear, targetMonth, 0).getDate();
          startDate = targetYear + "-" + String(targetMonth).padStart(2, "0") + "-" + String(lastDay).padStart(2, "0");
        }

        var startNAV = findOnOrBefore(filteredNav, startDate);
        var endNAV = filteredNav[filteredNav.length - 1][1];

        if (startNAV && endNAV) {
          var portReturn = (endNAV / startNAV - 1) * 100;
          var bmReturn = computeCompositeBMReturn(trMap, arbMap, strat.eqWeight, startDate, endDate);
          stratResults.push({
            strategy: strat.name,
            fullName: strat.fullName,
            portfolio: portReturn,
            benchmark: bmReturn,
            active: bmReturn !== null ? portReturn - bmReturn : null
          });
        }
      });
      results[tw] = stratResults;
    });

    // Filter out 1Y if no strategy has enough data
    var visibleWindows = windows.filter(function(tw) {
      if (tw === "1Y") return has1Y;
      return true;
    });

    return { windows: visibleWindows, results: results };
  }, [analysisDate]);

  // Compute monthly returns
  var monthlyData = useMemo(function() {
    // Get all month-end dates from NAV data
    var allDates = {};
    NAV_DATA.forEach(function(s) {
      s.d.forEach(function(p) {
        if (p[0] <= analysisDate) {
          var ym = p[0].substring(0, 7);
          if (!allDates[ym] || p[0] > allDates[ym]) allDates[ym] = p[0];
        }
      });
    });
    var monthEnds = Object.values(allDates).sort();

    var results = [];
    for (var i = 1; i < monthEnds.length; i++) {
      var startDate = monthEnds[i - 1];
      var endDate = monthEnds[i];
      var label = endDate;

      var entry = { month: label, strategies: {} };
      STRATEGIES.forEach(function(strat) {
        var nav = NAV_DATA.find(function(s) { return s.s === strat.name; });
        if (!nav) return;

        var sNAV = findOnOrBefore(nav.d, startDate);
        var eNAV = findOnOrBefore(nav.d, endDate);
        if (sNAV && eNAV) {
          var portReturn = (eNAV / sNAV - 1) * 100;
          var bmReturn = computeCompositeBMReturn(trMap, arbMap, strat.eqWeight, startDate, endDate);
          entry.strategies[strat.name] = {
            portfolio: portReturn,
            benchmark: bmReturn,
            active: bmReturn !== null ? portReturn - bmReturn : null
          };
        }
      });
      results.push(entry);
    }
    return results;
  }, [analysisDate]);

  // Compute risk metrics — uses same window logic as returns
  var riskData = useMemo(function() {
    var windows = timeWindowData.windows; // Reuse same visible windows (excludes 1Y if not enough data)
    var results = {};

    windows.forEach(function(tw) {
      var stratResults = [];
      STRATEGIES.forEach(function(strat) {
        var nav = NAV_DATA.find(function(s) { return s.s === strat.name; });
        if (!nav) return;

        var filteredNav = nav.d.filter(function(p) { return p[0] <= analysisDate; });
        if (filteredNav.length < 2) return;

        var endDate = filteredNav[filteredNav.length - 1][0];
        var inceptionDate = filteredNav[0][0];
        var startDate;

        if (tw === "SI") {
          startDate = inceptionDate;
        } else if (tw === "CYTD") {
          var yr = parseInt(endDate.split("-")[0]);
          startDate = (yr - 1) + "-12-31";
        } else if (tw === "FYTD") {
          var yr = parseInt(endDate.split("-")[0]);
          var mo = parseInt(endDate.split("-")[1]);
          if (mo <= 3) {
            startDate = (yr - 1) + "-03-31";
          } else {
            startDate = yr + "-03-31";
          }
        } else if (tw === "1Y") {
          var endParts = endDate.split("-");
          var oneYearBack = (parseInt(endParts[0]) - 1) + "-" + endParts[1] + "-" + endParts[2];
          if (inceptionDate > oneYearBack) return;
          var eYear = parseInt(endParts[0]);
          var eMonth = parseInt(endParts[1]);
          var targetMonth = eMonth - 12;
          var targetYear = eYear;
          while (targetMonth <= 0) { targetMonth += 12; targetYear--; }
          var lastDay = new Date(targetYear, targetMonth, 0).getDate();
          startDate = targetYear + "-" + String(targetMonth).padStart(2, "0") + "-" + String(lastDay).padStart(2, "0");
        } else {
          var months = parseInt(tw);
          var endParts = endDate.split("-");
          var eYear = parseInt(endParts[0]);
          var eMonth = parseInt(endParts[1]);
          var targetMonth = eMonth - months;
          var targetYear = eYear;
          while (targetMonth <= 0) { targetMonth += 12; targetYear--; }
          var lastDay = new Date(targetYear, targetMonth, 0).getDate();
          startDate = targetYear + "-" + String(targetMonth).padStart(2, "0") + "-" + String(lastDay).padStart(2, "0");
        }

        var fundDaily = getDailyReturns(filteredNav, startDate, endDate);
        var bmDaily = getBMDailyReturns(trMap, arbMap, strat.eqWeight, startDate, endDate);
        var startNAV = findOnOrBefore(filteredNav, startDate);
        var endNAV = filteredNav[filteredNav.length - 1][1];
        var bmReturn = computeCompositeBMReturn(trMap, arbMap, strat.eqWeight, startDate, endDate);

        var metrics = computeRiskMetrics(fundDaily, bmDaily, startNAV, endNAV, bmReturn);
        if (metrics) {
          metrics.strategy = strat.name;
          metrics.fullName = strat.fullName;
          stratResults.push(metrics);
        }
      });
      results[tw] = stratResults;
    });

    return { windows: windows, results: results };
  }, [analysisDate, timeWindowData]);

  // Format helpers
  function fmt(v, decimals) {
    if (v === null || v === undefined || isNaN(v)) return "—";
    return v.toFixed(decimals !== undefined ? decimals : 2) + "%";
  }
  function fmtNum(v, decimals) {
    if (v === null || v === undefined || isNaN(v)) return "—";
    return v.toFixed(decimals !== undefined ? decimals : 2);
  }
  function fmtDate(d) {
    if (!d) return "";
    var parts = d.split("-");
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return parseInt(parts[2]) + " " + months[parseInt(parts[1])-1] + " " + parts[0];
  }
  function monthLabel(d) {
    var parts = d.split("-");
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return months[parseInt(parts[1])-1] + " " + parts[0].slice(2);
  }

  // Cell color class — color coding is ALWAYS based on active return (vs benchmark)
  // Green = outperformed BM, Red = underperformed BM
  function cellClass(activeReturn, isActiveCol) {
    if (activeReturn === null || activeReturn === undefined || isNaN(activeReturn)) return "cell-neutral";
    if (isActiveCol) {
      // Active column itself: full cell color
      return activeReturn > 0.005 ? "cell-green" : activeReturn < -0.005 ? "cell-red" : "cell-neutral";
    }
    // Portfolio/BM cells: text color based on outperformance
    return activeReturn > 0.005 ? "cell-green" : activeReturn < -0.005 ? "cell-red" : "cell-neutral";
  }
  // Simple positive/negative text color (no BM context, e.g. BM column)
  function valColorClass(val) {
    if (val === null || val === undefined || isNaN(val)) return "";
    return val > 0.005 ? "cell-positive" : val < -0.005 ? "cell-negative" : "";
  }

  // Export to Excel
  function exportExcel(tableId, filename) {
    var table = document.getElementById(tableId);
    if (!table) return;
    var wb = XLSX.utils.book_new();
    var ws = XLSX.utils.table_to_sheet(table);
    XLSX.utils.book_append_sheet(wb, ws, "Data");
    XLSX.writeFile(wb, filename + ".xlsx");
  }

  // Export to PDF
  function exportPDF(tableId, filename, title) {
    var doc = new jspdf.jsPDF({ orientation: "landscape" });
    doc.setFontSize(16);
    doc.text(title || "Ionic Allocate Portfolio", 14, 15);
    doc.setFontSize(10);
    doc.text("As of: " + fmtDate(analysisDate), 14, 22);
    doc.autoTable({
      html: "#" + tableId,
      startY: 28,
      styles: { fontSize: 9, cellPadding: 3 },
      headStyles: { fillColor: [26, 26, 46], textColor: [255, 255, 255] },
      alternateRowStyles: { fillColor: [248, 250, 252] },
      didParseCell: function(data) {
        if (data.section === "body" && data.column.index > 0) {
          var text = data.cell.text[0] || "";
          var val = parseFloat(text);
          if (!isNaN(val)) {
            if (text.includes("Active") || data.row.raw.some(function(c) { return typeof c === "string" && c.includes("Active"); })) {
              // Active column
            }
            if (val > 0) data.cell.styles.textColor = [22, 101, 52];
            else if (val < 0) data.cell.styles.textColor = [220, 38, 38];
          }
        }
      }
    });
    doc.save(filename + ".pdf");
  }

  // ─── Render ───
  return e("div", null,
    // Header
    e("div", { className: "header" },
      e("div", null,
        e("h1", null, "IONIC ALLOCATE PORTFOLIO"),
        e("div", { className: "subtitle" }, "Scheme Returns & Risk Dashboard")
      ),
      e("div", { className: "header-right" },
        e("div", { className: "control-group" },
          e("span", { className: "data-date", style: { marginRight: 8 } }, "Analysis Date:"),
          e("div", { className: "toggle-group" },
            e("button", { className: "toggle-btn" + (dateMode === "latest" ? " active" : ""), onClick: function() { setDateMode("latest"); } }, "Latest"),
            e("button", { className: "toggle-btn" + (dateMode === "custom" ? " active" : ""), onClick: function() { setDateMode("custom"); } }, "Custom")
          ),
          dateMode === "custom" && e("input", { type: "date", className: "date-input", value: customDate, onChange: function(ev) { setCustomDate(ev.target.value); }, max: latestDataDate })
        ),
        e("div", { className: "data-date" }, "Data as of: " + fmtDate(analysisDate))
      )
    ),

    e("div", { className: "container" },
      // Tabs
      e("div", { className: "tab-bar" },
        e("button", { className: "tab-btn" + (activeTab === "returns" ? " active" : ""), onClick: function() { setActiveTab("returns"); } }, "Scheme Returns"),
        e("button", { className: "tab-btn" + (activeTab === "risk" ? " active" : ""), onClick: function() { setActiveTab("risk"); } }, "Risk Metrics")
      ),

      // ══════════════ RETURNS TAB ══════════════
      activeTab === "returns" && e("div", null,
        // Controls
        e("div", { className: "controls" },
          e("div", { className: "control-group" },
            e("span", { className: "control-label" }, "View"),
            e("div", { className: "toggle-group" },
              e("button", { className: "toggle-btn" + (returnView === "windows" ? " active" : ""), onClick: function() { setReturnView("windows"); } }, "Time Windows"),
              e("button", { className: "toggle-btn" + (returnView === "monthly" ? " active" : ""), onClick: function() { setReturnView("monthly"); } }, "Month on Month")
            )
          ),
          e("label", { className: "radio-toggle" },
            e("input", { type: "checkbox", checked: showActive, onChange: function() { setShowActive(!showActive); } }),
            e("span", { className: "radio-dot" }),
            e("span", { className: "radio-label" }, "Show Active Returns")
          ),
          e("div", { style: { flex: 1 } }),
          e("div", { className: "export-group" },
            e("button", { className: "export-btn excel", onClick: function() { exportExcel("returns-table", "Ionic_Returns_" + analysisDate); } }, "\u{1F4CA}", " Excel"),
            e("button", { className: "export-btn pdf", onClick: function() { exportPDF("returns-table", "Ionic_Returns_" + analysisDate, "Ionic Allocate — Scheme Returns"); } }, "\u{1F4C4}", " PDF")
          )
        ),

        // Time Windows Table
        returnView === "windows" && e("div", { className: "table-card" },
          e("div", { className: "table-title" }, "Returns by Time Window"),
          e("table", { id: "returns-table" },
            e("thead", null,
              e("tr", null,
                e("th", { style: { textAlign: "left" } }, "Strategy"),
                timeWindowData.windows.map(function(tw) {
                  var cols = [
                    e("th", { key: tw + "-port" }, tw + " Port"),
                    e("th", { key: tw + "-bm" }, tw + " BM")
                  ];
                  if (showActive) {
                    cols.push(e("th", { key: tw + "-act", style: { borderRight: "2px solid #e2e8f0" } }, tw + " Active"));
                  } else {
                    cols[cols.length - 1] = e("th", { key: tw + "-bm", style: { borderRight: "2px solid #e2e8f0" } }, tw + " BM");
                  }
                  return cols;
                })
              )
            ),
            e("tbody", null,
              STRATEGIES.map(function(strat) {
                return e("tr", { key: strat.name },
                  e("td", null, strat.fullName),
                  timeWindowData.windows.map(function(tw) {
                    var data = (timeWindowData.results[tw] || []).find(function(r) { return r.strategy === strat.name; });
                    if (!data) {
                      var emptyCols = [e("td", { key: tw + "-p" }, "—"), e("td", { key: tw + "-b" }, "—")];
                      if (showActive) emptyCols.push(e("td", { key: tw + "-a" }, "—"));
                      return emptyCols;
                    }
                    var cols = [
                      e("td", { key: tw + "-p", className: cellClass(data.active) }, fmt(data.portfolio)),
                      e("td", { key: tw + "-b", className: valColorClass(data.benchmark) }, fmt(data.benchmark))
                    ];
                    if (showActive) {
                      cols.push(e("td", { key: tw + "-a", className: cellClass(data.active, true), style: { borderRight: "2px solid #e2e8f0" } }, fmt(data.active)));
                    } else {
                      cols[cols.length - 1] = e("td", { key: tw + "-b", className: valColorClass(data.benchmark), style: { borderRight: "2px solid #e2e8f0" } }, fmt(data.benchmark));
                    }
                    return cols;
                  })
                );
              })
            )
          )
        ),

        // Monthly Table
        returnView === "monthly" && e("div", { className: "table-card" },
          e("div", { className: "table-title" }, "Month-on-Month Returns"),
          e("table", { id: "returns-table" },
            e("thead", null,
              e("tr", null,
                e("th", { style: { textAlign: "left" } }, "Month"),
                STRATEGIES.map(function(strat) {
                  var cols = [
                    e("th", { key: strat.name + "-port" }, strat.name + " Port"),
                    e("th", { key: strat.name + "-bm" }, strat.name + " BM")
                  ];
                  if (showActive) {
                    cols.push(e("th", { key: strat.name + "-act", style: { borderRight: "2px solid #e2e8f0" } }, strat.name + " Active"));
                  } else {
                    cols[cols.length - 1] = e("th", { key: strat.name + "-bm", style: { borderRight: "2px solid #e2e8f0" } }, strat.name + " BM");
                  }
                  return cols;
                })
              )
            ),
            e("tbody", null,
              monthlyData.slice().reverse().map(function(entry) {
                return e("tr", { key: entry.month },
                  e("td", null, monthLabel(entry.month)),
                  STRATEGIES.map(function(strat) {
                    var data = entry.strategies[strat.name];
                    if (!data) {
                      var emptyCols = [e("td", { key: strat.name + "-p" }, "—"), e("td", { key: strat.name + "-b" }, "—")];
                      if (showActive) emptyCols.push(e("td", { key: strat.name + "-a" }, "—"));
                      return emptyCols;
                    }
                    var cols = [
                      e("td", { key: strat.name + "-p", className: cellClass(data.active) }, fmt(data.portfolio)),
                      e("td", { key: strat.name + "-b", className: valColorClass(data.benchmark) }, fmt(data.benchmark))
                    ];
                    if (showActive) {
                      cols.push(e("td", { key: strat.name + "-a", className: cellClass(data.active, true), style: { borderRight: "2px solid #e2e8f0" } }, fmt(data.active)));
                    } else {
                      cols[cols.length - 1] = e("td", { key: strat.name + "-b", className: valColorClass(data.benchmark), style: { borderRight: "2px solid #e2e8f0" } }, fmt(data.benchmark));
                    }
                    return cols;
                  })
                );
              })
            )
          )
        ),

        // Inception dates footnote
        e("div", { style: { fontSize: 11, color: "#94a3b8", padding: "8px 4px" } },
          STRATEGIES.map(function(strat) {
            var nav = NAV_DATA.find(function(s) { return s.s === strat.name; });
            if (!nav) return null;
            return strat.name + " inception: " + fmtDate(nav.d[0][0]);
          }).filter(Boolean).join("  |  ")
        )
      ),

      // ══════════════ RISK TAB ══════════════
      activeTab === "risk" && e("div", null,
        // Controls
        e("div", { className: "controls" },
          e("div", { className: "control-group" },
            e("span", { className: "control-label" }, "Period"),
            e("div", { className: "toggle-group" },
              riskData.windows.map(function(tw) {
                return e("button", { key: tw, className: "toggle-btn" + (riskWindow === tw ? " active" : ""), onClick: function() { setRiskWindow(tw); } }, tw);
              })
            )
          ),
          e("div", { style: { flex: 1 } }),
          e("div", { className: "export-group" },
            e("button", { className: "export-btn excel", onClick: function() { exportExcel("risk-table", "Ionic_Risk_" + riskWindow + "_" + analysisDate); } }, "\u{1F4CA}", " Excel"),
            e("button", { className: "export-btn pdf", onClick: function() { exportPDF("risk-table", "Ionic_Risk_" + riskWindow + "_" + analysisDate, "Ionic Allocate — Risk Metrics (" + riskWindow + ")"); } }, "\u{1F4C4}", " PDF")
          )
        ),

        e("div", { className: "table-card" },
          e("div", { className: "table-title" }, "Risk Metrics — ", riskWindow, " Window"),
          e("table", { id: "risk-table" },
            e("thead", null,
              e("tr", null,
                e("th", { style: { textAlign: "left" } }, "Metric"),
                STRATEGIES.map(function(strat) {
                  return e("th", { key: strat.name }, strat.fullName);
                })
              )
            ),
            e("tbody", null,
              [
                { label: "Cumulative Return", key: "cumReturn", fmt: "pct", colorActive: false },
                { label: "Benchmark Return", key: "bmReturn", fmt: "pct", colorActive: false },
                { label: "Alpha (Ann.)", key: "alpha", fmt: "pct", colorActive: true },
                { label: "Annualised Return", key: "annReturn", fmt: "pct", colorActive: false },
                { label: "Annualised BM Return", key: "annBmReturn", fmt: "pct", colorActive: false },
                { label: "Std Deviation (Ann.)", key: "stdDev", fmt: "pct", colorActive: false },
                { label: "Downside Deviation", key: "downsideDev", fmt: "pct", colorActive: false },
                { label: "Beta", key: "beta", fmt: "num", colorActive: false },
                { label: "Sharpe Ratio", key: "sharpe", fmt: "num", colorActive: false },
                { label: "Sortino Ratio", key: "sortino", fmt: "num", colorActive: false },
                { label: "Treynor Ratio", key: "treynor", fmt: "num", colorActive: false },
                { label: "Max Drawdown", key: "maxDrawdown", fmt: "pct", colorActive: false },
                { label: "Tracking Error", key: "trackingError", fmt: "pct", colorActive: false }
              ].map(function(metric) {
                var riskResults = riskData.results[riskWindow] || [];
                return e("tr", { key: metric.key },
                  e("td", null, metric.label),
                  STRATEGIES.map(function(strat) {
                    var data = riskResults.find(function(r) { return r.strategy === strat.name; });
                    if (!data) return e("td", { key: strat.name }, "—");
                    var val = data[metric.key];
                    var cls = "";
                    if (metric.colorActive && val !== null && val !== undefined) {
                      cls = val > 0.005 ? "cell-green" : val < -0.005 ? "cell-red" : "cell-neutral";
                    }
                    return e("td", { key: strat.name, className: cls },
                      metric.fmt === "pct" ? fmt(val) : fmtNum(val)
                    );
                  })
                );
              })
            )
          )
        ),

        // Inception dates
        e("div", { style: { fontSize: 11, color: "#94a3b8", padding: "8px 4px" } },
          "Benchmark: Blended composite — Aggressive (80% Nifty 50 TRI + 20% Nifty 50 Arb), Equity (100% Nifty 50 TRI), Moderate (50% Nifty 50 TRI + 50% Nifty 50 Arb). Risk-free rate: 0%."
        )
      )
    ),

    // Footer
    e("div", { className: "footer" }, "Ionic Allocate Portfolio | Generated ", fmtDate(new Date().toISOString().slice(0, 10)))
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
} catch(err) { document.getElementById("root").innerHTML = "<pre style='color:red;padding:20px'>Error: " + err.message + "\n" + err.stack + "</pre>"; }
</script>
</body>
</html>
